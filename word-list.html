<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexis - Мои слова</title>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <link rel="stylesheet" href="styles.css?v=13">
    <link rel="stylesheet" href="word-list.css">
    <style>
        body { min-height: 100vh; visibility: visible !important; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
</head>
<body style="visibility: visible !important;">
    <header>
        <nav class="container">
            <a href="index.html" class="logo" onclick="window.location.href='index.html?t='+Date.now(); return false;">
                <img src="/logo.png" alt="Lexis" class="logo-img">
            </a>
            <div class="nav-links">
                <a href="tiers.html" data-i18n="wordList.backToTiers">← Назад к выбору уровня</a>
                <div class="language-selector">
                    <button class="language-btn" id="languageBtn">
                        <span class="flag">🇷🇺</span>
                        <span class="lang-text">RU</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="language-dropdown" id="languageDropdown">
                        <div class="language-option" data-lang="ru">
                            <span class="flag">🇷🇺</span>
                            <span>Русский</span>
                        </div>
                        <div class="language-option" data-lang="en">
                            <span class="flag">🇬🇧</span>
                            <span>English</span>
                        </div>
                        <div class="language-option" data-lang="zh">
                            <span class="flag">🇨🇳</span>
                            <span>中文</span>
                        </div>
                    </div>
                </div>
                <div id="userSection" class="user-section">
                    <div id="userProfile" class="user-profile" style="display: none;">
                        <div class="user-info-trigger" id="userInfoTrigger">
                            <img id="userAvatar" class="user-avatar" src="" alt="User">
                            <span id="userName" class="user-name"></span>
                            <span class="dropdown-arrow">▼</span>
                        </div>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="profile.html" class="dropdown-item">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M20.5899 22C20.5899 18.13 16.7399 15 11.9999 15C7.25991 15 3.40991 18.13 3.40991 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <span data-i18n="dropdown.profile">Профиль</span>
                            </a>
                            <div class="dropdown-divider"></div>
                            <button id="signOutBtn" class="dropdown-item dropdown-signout">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <span data-i18n="auth.signOut">Выйти</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="word-list-container">
        <div class="word-list-header">
            <div class="header-top">
                <h1 id="pageTitle" data-i18n="wordList.title">Мои слова</h1>
                <button class="btn-quiz" id="startQuizBtn" style="display: none;" data-i18n="wordList.testAgain">
                    🎯 Протестировать заново
                </button>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab" data-status="learned">
                    <span class="tab-icon">✓</span>
                    <span class="tab-label" data-i18n="wordList.tabLearned">Выученные</span>
                    <span class="tab-count" id="learnedCount">0</span>
                </button>
                <button class="filter-tab" data-status="reviewed">
                    <span class="tab-icon">📖</span>
                    <span class="tab-label" data-i18n="wordList.tabReviewed">Просмотренные</span>
                    <span class="tab-count" id="reviewedCount">0</span>
                </button>
            </div>
            <div class="search-container">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search words..."
                    data-i18n-placeholder="wordList.searchPlaceholder"
                />
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div class="words-grid" id="wordsGrid">
            <!-- Words will be inserted here -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📚</div>
            <h2 data-i18n="wordList.emptyTitle">Пока нет слов в этой категории</h2>
            <p data-i18n="wordList.emptyDesc">Начните изучение, чтобы слова появились здесь</p>
            <a href="learn.html" class="btn-primary" data-i18n="wordList.startLearning">Начать изучение</a>
        </div>
    </div>

    <script type="module" src="/src/pages/word-list.ts"></script>
</body>
</html>
